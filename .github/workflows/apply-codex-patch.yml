name: Apply Codex patch

on:
  push:
    branches:
      - codex/excel-template-export

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply generated patch
        run: |
          cat .codex/patch/patch-*.b64 > /tmp/codex.patch.b64
          base64 -d /tmp/codex.patch.b64 | gzip -d > /tmp/codex.patch
          git apply --index /tmp/codex.patch
          rm -rf .codex/patch .github/workflows/apply-codex-patch.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Use uploaded settlement report template"
          git push origin HEAD:${GITHUB_REF_NAME}
